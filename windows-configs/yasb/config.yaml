watch_stylesheet: true
watch_config: true
debug: false

komorebi:
  start_command: "komorebic start"
  stop_command: "komorebic stop"
  reload_command: "komorebic stop && komorebic start"

bars:
  status-bar:
    enabled: true
    screens: ['*'] 
    class_name: "yasb-bar"
#    stylesheet: "styles.css"
    alignment:
      position: "top"
      center: false
    blur_effect:
      enabled: false 
      acrylic: false 
      dark_mode: false
      round_corners: false
      border_color: None
    window_flags:
      always_on_top: true
      windows_app_bar: true
      hide_on_fullscreen: true
    dimensions:
      width: "100%"
      height: 34
    padding:
      top: 6
      left: 8
      bottom: 2
      right: 8
    widgets:
      left: ["komorebi_workspaces","active_window"]
      center: ["pomodoro","cava","clock","media"]
      right: ["system_tray","cpu","gpu","memory","brightness","volume","battery","notifications","wifi","power_menu"]
widgets:
  cava:
    type: "yasb.cava.CavaWidget"
    options:
      bar_height: 12
      min_bar_height: 0
      gradient: 1
      foreground: "#89b4fa"
      gradient_color_1: '#74c7ec'
      gradient_color_2: '#89b4fa'
      gradient_color_3: '#cba6f7'
      bars_number: 8
      bar_spacing: 2
      bar_width: 4
      bar_type: "bars"
      framerate: 60
      hide_empty: true
  media:
      type: "yasb.media.MediaWidget"
      options:
        label: "{title}"
        label_alt: "{artist}"
        hide_empty: true
        max_field_size:
          label: 20
          label_alt: 20
        show_thumbnail: true
        controls_only: false
        controls_left: true
        thumbnail_alpha: 150
        thumbnail_padding: 8
        thumbnail_corner_radius: 0
        icons:
          prev_track: "\ue892"
          next_track: "\ue893"
          play: "\ue768"
          pause: "\ue769"
  taskbar:
      type: "yasb.taskbar.TaskbarWidget"
      options:
        icon_size: 16
        animation:
          enabled: true
          duration: 200
          type: "fadeInOut"
        title_label:
          enabled: false
          show: "focused"
          min_length: 10
          max_length: 30
        ignore_apps:
          processes: []
          titles: []
          classes: []
        container_padding:
          top: 0
          left: 8
          bottom: 0
          right: 8
  cpu:
      type: "yasb.cpu.CpuWidget"
      options:
        label: "<span>\ue950</span> {info[percent][total]}%"
        label_alt: "{info[histograms][cpu_percent]}"
        update_interval: 1000
        histogram_icons:
          - '\u2581'
          - '\u2581'
          - '\u2582'
          - '\u2583'
          - '\u2584'
          - '\u2585'
          - '\u2586'
          - '\u2587'
          - '\u2588'
        histogram_num_columns: 8
        callbacks:
          on_left: "exec cmd /c Taskmgr"
          on_middle: "exec cmd /c Taskmgr"
          on_right: "do_nothing"
        container_padding:
          top: 0
          left: 0
          bottom: 0
          right: 0
  pomodoro:
      type: "yasb.pomodoro.PomodoroWidget"
      options:
        label: "<span>{icon}</span> {remaining}"
        label_alt: "<span>{icon}</span> {session}/{total_sessions} - {status}"
        work_duration: 25
        break_duration: 5
        long_break_duration: 15
        long_break_interval: 4
        auto_start_breaks: true
        auto_start_work: true
        sound_notification: true
        show_notification: true
        hide_on_break: false
        session_target: 8
        icons:
          work: "\uf252"
          break: "\uf253"
          paused: "\uf254"
        menu:
          blur: true
          round_corners: true
          round_corners_type: "normal"
          border_color: "System"
          alignment: "right"
          direction: "down"
          offset_top: 6
          offset_left: 0
          circle_background_color: "#09ffffff"
          circle_work_progress_color: "#88c0d0"
          circle_break_progress_color: "#a3be8c"
          circle_thickness: 8
          circle_size: 160
        callbacks:
          on_left: "toggle_menu"
          on_middle: "reset_timer"
          on_right: "toggle_label"
        label_shadow:
          enabled: true
          color: "black"
          radius: 3
          offset: [ 1, 1 ]

  notifications:
      type: "yasb.notifications.NotificationsWidget"
      options:
        label: "<span>\uf476</span> {count}"
        label_alt: "{count} notifications"
        hide_empty: false
        tooltip: true
        callbacks:
          on_left: "exec explorer.exe ms-actioncenter:"
          on_right: "do_nothing"
          on_middle: "toggle_label"
        label_shadow:
          enabled: true
          color: "black"
          radius: 3
          offset: [ 1, 1 ]

  gpu:
      type: "yasb.gpu.GpuWidget"
      options:
        label: "<span>\uf4bc</span> {info[utilization]}%"
        label_alt: "<span>\uf4bc</span> {info[temp]}°C | {info[mem_used]} / {info[mem_total]}"
        update_interval: 2000
        gpu_thresholds:
          low: 25
          medium: 50
          high: 90
        histogram_icons:
          - "\u2581"
          - "\u2581"
          - "\u2582"
          - "\u2583"
          - "\u2584"
          - "\u2585"
          - "\u2586"
          - "\u2587"
          - "\u2588"
        histogram_num_columns: 8
        callbacks:
          on_left: "toggle_label"
          on_middle: "exec cmd /c Taskmgr"
          on_right: "do_nothing"
        container_padding:
          top: 0
          left: 0
          bottom: 0
          right: 0
  clock:
      type: "yasb.clock.ClockWidget"
      options:
        label: "{%a %d, %b %H:%M}"
        label_alt: "{%A %d %B %Y, %H:%M}"
        timezones: []
        callbacks:
          on_left: "exec explorer.exe shell:::{F8278C54-A712-415b-B593-B77A2BE0DDA9}"
          on_right: "toggle_label"
  komorebi_workspaces:
      type: "komorebi.workspaces.WorkspaceWidget"
      options:
          label_offline: "\u26a1 Offline"
          label_workspace_btn: ""
          label_workspace_active_btn: ""
          label_workspace_populated_btn: ""
          label_default_name: "{index}"
          label_zero_index: false
          hide_empty_workspaces: true
          hide_if_offline: false
          animation: true
          app_icons:
            enabled_populated: false
            enabled_active: true
            size: 16
            hide_label: false
            hide_duplicates: true
            hide_floating: false
          container_padding:
            top: 0
            left: 0
            bottom: 0
            right: 0 
  komorebi_active_layout:
      type: "komorebi.active_layout.ActiveLayoutWidget"
      options:
        hide_if_offline: true
        label: "{icon}"
        layouts: ['bsp', 'columns', 'rows', 'grid', 'vertical_stack', 'horizontal_stack', 'ultrawide_vertical_stack','right_main_vertical_stack']
        layout_icons:
          bsp: "BSP"
          columns: "COLS"
          rows: "ROWS"
          grid: "GRID"
          vertical_stack: "V-STACK"
          horizontal_stack: "H-STACK"
          ultrawide_vertical_stack: "W-STACK"
          right_main_vertical_stack: "RMV-STACK"
          monocle: "MONOCLE"
          maximised: "MAX"
          floating: "FLOATING"
          paused: "PAUSED"
        callbacks:
          on_left: 'next_layout'
          on_middle: 'toggle_monocle'
          on_right: 'prev_layout'
        container_padding: 
          top: 0
          left: 0
          bottom: 0
          right: 0
  # weather widget removed per user request
  volume:
      type: "yasb.volume.VolumeWidget"
      options:
        label: "<span>{icon}</span> {level}"
        label_alt: "{volume}"
        volume_icons:
          - "\ueee8"  # Icon for muted
          - "\uf026"  # Icon for 0-10% volume
          - "\uf027"  # Icon for 11-30% volume
          - "\uf027"  # Icon for 31-60% volume
          - "\uf028"  # Icon for 61-100% volume
        callbacks:
          on_left: "toggle_volume_menu"
          on_right: "toggle_mute"
        audio_menu:
          blur: true
          round_corners: true
          border_color: None
          alignment: "right"
          direction: "down"
          distance: 4
  power_menu:
      type: "yasb.power_menu.PowerMenuWidget"
      options:
        label: "\uf011"
        uptime: True
        blur: False
        blur_background: True
        animation_duration: 250 # Milisecond 
        button_row: 5 # Number of buttons in row, min 1 max 5
        buttons:
          signout: ["\udb80\udf43","Sign out"]
          shutdown: ["\uf011","Shut Down"]
          restart: ["\uead2","Restart"]
          hibernate: ["\uf28e","Hibernate"]
          cancel: ["\udb81\udf3a","Cancel"]
  custom_button:
      type: "yasb.custom.CustomWidget"
      options:
        label: "<span>\udb80\udf5c</span>"
        label_alt: "<span>\udb80\udf5c</span>"
        class_name: "start-menu"
        callbacks:
          on_left: "exec start_menu"
  system_tray:
      type: "yasb.grouper.GrouperWidget"
      options:
        class_name: "system-tray-grouper"
        widgets: ["systray","separator"]
        collapse_options:
          enabled: true
          expanded_label: "\uf054"
          collapsed_label: "\uf053"
          label_position: "left"
  systray:
      type: "yasb.systray.SystrayWidget"
      options:
        class_name: "systray"
        label_collapsed: "\uf438"
        label_expanded: "\uf44a"
        label_position: "left"
        icon_size: 16
        pin_click_modifier: "ctrl"
        show_unpinned: true
        show_unpinned_button: false
        show_battery: false
        show_volume: false
        show_network: false
  separator:
      type: "yasb.custom.CustomWidget"
      options:
        label: "\u007c"
        label_alt: "\u007c"
        class_name: "separator-widget"
        callbacks:
          on_left: "do_nothing"
  brightness:
      type: "yasb.brightness.BrightnessWidget"
      options:
        label: "<span>{icon}</span> {percent}%"
        label_alt: "Brightness {percent}%"
        tooltip: true
        hide_unsupported: false
        brightness_icons: [
          "\udb80\udcde",  # Icon for 0-25%
          "\udb80\udcdd",  # Icon for 26-50%
          "\udb80\udcdf",  # Icon for 51-75%
          "\udb80\udce0"   # Icon for 76-100%
        ]
        callbacks:
            on_left: "toggle_label"
            on_middle: "do_nothing"
            on_right: "do_nothing"
  active_window:
      type: "yasb.active_window.ActiveWindowWidget"
      options:
        label: "{win[title]}"
        label_alt: ""
        label_no_window: ""
        label_icon: false
        label_icon_size: 12
        max_length: 36
        max_length_ellipsis: "..."
        monitor_exclusive: true
  battery:
      type: "yasb.battery.BatteryWidget"
      options:
        label: "<span>{icon}</span>{percent}%"
        label_alt: "{icon} {percent}% | time: {time_remaining}"
        charging_options:
          icon_format: "{charging_icon}"
  # temperature and brightness widgets removed (no native modules available)
  language:
      type: "yasb.language.LanguageWidget"
      options:
        label: "{lang[language_code]}"
        label_alt: "{lang[full_name]}"
        update_interval: 1
        callbacks:
          on_left: "toggle_label"
          on_middle: "do_nothing"
          on_right: "do_nothing"
  memory:
      type: "yasb.memory.MemoryWidget"
      options:
        label: "<span>\uefc5</span> {virtual_mem_percent}%"
        label_alt: "<span>\uefc5</span> {virtual_mem_used}/{virtual_mem_total}"
        update_interval: 5000
        callbacks:
          on_left: 'toggle_label'
          on_middle: 'do_nothing'
          on_right: 'do_nothing'
        memory_thresholds:
          low: 25
          medium: 50
          high: 90
        container_padding:
          top: 0
          left: 0
          bottom: 0
          right: 0
  wallpapers:
    type: "yasb.wallpapers.WallpapersWidget"
    options:
      label: "<span>\udb83\ude09</span>"
      image_path: "C:\\your\\Wallpapers\\path" # Example path to folder with images
      change_automatically: false # Automatically change wallpaper
      update_interval: 60 # If change_automatically is true, update interval in seconds
      gallery:
          enabled: true
          blur: true
          image_width: 200
          image_per_page: 7
          show_buttons: false
          orientation: "portrait"
          image_spacing: 8
          lazy_load: true
          lazy_load_delay: 80
          lazy_load_fadein: 400
          image_corner_radius: 20
          enable_cache: true
  wifi:
    type: "yasb.wifi.WifiWidget"
    options:
      label: "<span>{wifi_icon}</span>"
      label_alt: "{wifi_name}"
      update_interval: 5000
      callbacks:
        on_left: "exec explorer.exe ms-availablenetworks:"
        on_middle: "exec cmd.exe /c start ms-settings:network"
        on_right: "toggle_label"
      menu_config:
        blur: trueq
        round_corners: true
        round_corners_type: "normal"
        border_color: "System"
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 0
        wifi_icons_secured:
          - "\ue670"
          - "\ue671"
          - "\ue672"
          - "\ue673"
        wifi_icons_unsecured:
          - "\uec3c"
          - "\uec3d"
          - "\uec3e"
          - "\uec3f"
      menu_config:
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "System"
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 0
        wifi_icons_secured:
          - "\ue670"
          - "\ue671"
          - "\ue672"
          - "\ue673"
        wifi_icons_unsecured:
          - "\uec3c"
          - "\uec3d"
          - "\uec3e"
          - "\uec3f"
  obs:
    type: "yasb.obs.ObsWidget"
    options:  
      connection:
        host: "193.147.0.101"
        port: 4400
        password: "yourstrongpassword:3"
      icons:
        recording: "\ueba7"
        stopped: "\ueba5"
        paused: "\ueba7"
      hide_when_not_recording: true
      blinking_icon: true
  update:
    type: "yasb.update_check.UpdateCheckWidget"
    options:
      winget_update:
        enabled: false
        label: "<span>\uf0ab</span>{count}"
        interval: 180
        exclude: []
      windows_update:
        enabled: false
        label: "<span>\uf0ab</span>{count}"
        interval: 240
        exclude: []
